# ── Logging ───────────────────────────────
logging:
  level:
    root: WARN
    com.jazzify..package: INFO            # ← 패키지명 변경
  file:
    name: /var/log/backend/application.log
  logback:
    rollingpolicy:
      max-file-size: 100MB
      max-history: 30

# ── Swagger / Springdoc ───────────────────
springdoc:
  api-docs:
    enabled: true
  swagger-ui:
    enabled: true
    tags-sorter: alpha
    operations-sorter: method