# ── Logging ───────────────────────────────
logging:
  level:
    root: WARN
    com.jazzify.backend: INFO
    com.jazzify.backend.shared.embedding.EmbeddingClient: INFO   # 임베딩 요청/응답 로그 (DEBUG → 상세 로그)
  file:
    name: /var/log/backend/application.log
  logback:
    rollingpolicy:
      max-file-size: 100MB
      max-history: 30

# ── Swagger / Springdoc ───────────────────
springdoc:
  api-docs:
    enabled: true
  swagger-ui:
    enabled: true
    tags-sorter: alpha
    operations-sorter: method

# ── OMR Server ────────────────────────────
omr:
  server-url: ${OMR_SERVER_URL:}
  # OMR 서버 요청 시 X-OMR-API-Key 헤더 값
  api-key: ${OMR_API_KEY:}
  # OMR 서버가 콜백 시 보내는 X-OMR-Callback-API-Key 검증용
  callback-api-key: ${OMR_CALLBACK_API_KEY:}
  # prod 환경: callbackUrl 미설정 → /omr/prod/process 사용 (OMR 서버 측에 정적 URL 등록)
  callback-url:


# ── Embedding Server ──────────────────────
# OMR 서버와 동일한 호스트, 포트만 다름 (컨테이너: jazzify-embedding-worker:8000)
embedding:
  server-url: ${EMBEDDING_SERVER_URL:}  # 임베딩 서버 베이스 URL (예: http://jazzify-embedding-worker:8000)
  api-key: ${EMBEDDING_API_KEY:}        # 내부망 호출이면 비워도 됨


# ── RAG Server (PostgreSQL + pgvector) ─────────────
rag:
  enabled: true
  datasource:
    url: ${RAG_DB_URL:}
    username: ${RAG_DB_USERNAME:}
    password: ${RAG_DB_PASSWORD:}
    driver-class-name: org.postgresql.Driver
    maximum-pool-size: 8
  bootstrap:
    enabled: true
    create-schema: true
    data-root: /app/data/explanation
  vector-store:
    schema-name: ${RAG_VECTOR_SCHEMA:public}
    table-name: ${RAG_VECTOR_TABLE:rag_chunk_store}
    initialize-schema: true          # prod: 앱이 테이블을 자동 생성하지 않음 (스키마는 사전 배포)
    schema-validation: false        # prod: 구동 시 테이블 구조 불일치 시 즉시 실패 (fail-fast)
    dimensions: ${RAG_VECTOR_DIMENSIONS:768}
  retrieval:
    top-k: 5
    n-per-query: 3
    rrf-k: 60

