# =============================================
# Prod Profile - 운영 환경 설정
# 민감한 값은 반드시 환경변수로 주입 (기본값 없음)
# =============================================

server:
  port: ${SERVER_PORT:8080}
  servlet:
    context-path: /api
  shutdown: graceful
  forward-headers-strategy: framework
  tomcat:
    accept-count: 100
    max-connections: 8192
    threads:
      max: 200
      min-spare: 20

spring:
  # ── Database ──────────────────────────────
  datasource:
    url: jdbc:${DB_DRIVER}://${DB_HOST}:${DB_PORT}/${DB_NAME}?useSSL=true&serverTimezone=Asia/Seoul
    username: ${DB_USERNAME}          # 기본값 없음 - 반드시 환경변수 필요
    password: ${DB_PASSWORD}          # 기본값 없음 - 반드시 환경변수 필요
    driver-class-name: com.mysql.cj.jdbc.Driver
    hikari:
      maximum-pool-size: 20
      minimum-idle: 5
      connection-timeout: 30000
      idle-timeout: 600000
      max-lifetime: 1800000

  # ── JPA ───────────────────────────────────
  jpa:
    hibernate:
      ddl-auto: update             # prod: 스키마 자동 변경 방지
    show-sql: false
    properties:
      hibernate:
        dialect: org.hibernate.dialect.MySQLDialect

  ai:
    anthropic:
      api-key: ${ANTHROPIC_API_KEY:}
      base-url: https://api.anthropic.com
      chat:
        model: claude-sonnet-4-6
        max-tokens: 16384

  # ── Redis ─────────────────────────────────
  data:
    redis:
      host: ${REDIS_HOST}
      port: ${REDIS_PORT}
      password: ${REDIS_PASSWORD}

  servlet:
    multipart:
      max-file-size: 20MB
      max-request-size: 25MB

#  # ── Mail ──────────────────────────────────
#  mail:
#    host: ${MAIL_HOST}
#    port: ${MAIL_PORT}
#    username: ${MAIL_USERNAME}
#    password: ${MAIL_PASSWORD}
#    properties:
#      mail.smtp.auth: true
#      mail.smtp.starttls.enable: true

# ── JWT ───────────────────────────────────
jwt:
  secret: ${JWT_SECRET}               # 기본값 없음 - 반드시 환경변수 필요
  access-expiration: ${JWT_ACCESS_EXPIRATION:1800000}   # 30분
  refresh-expiration: ${JWT_REFRESH_EXPIRATION:604800000} # 7일

# ── Cookie ────────────────────────────────
cookie:
  secure: true

# ── CORS ──────────────────────────────────
cors:
  allowed-origins: ${CORS_ALLOWED_ORIGINS}
