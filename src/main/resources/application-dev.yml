# =============================================
# Dev Profile - 개발 환경 설정
# 개인별로 다른 값은 .env 파일의 환경변수로 관리
# =============================================

server:
  port: ${SERVER_PORT:8080}
  servlet:
    context-path: /api

spring:
  # ── Database ──────────────────────────────
  datasource:
    url: jdbc:${DB_DRIVER:mysql}://${DB_HOST:localhost}:${DB_PORT:3306}/${DB_NAME:backend_dev}?useSSL=false&allowPublicKeyRetrieval=true&serverTimezone=Asia/Seoul
    username: ${DB_USERNAME:root}
    password: ${DB_PASSWORD:}
    driver-class-name: com.mysql.cj.jdbc.Driver
    hikari:
      maximum-pool-size: 5
      minimum-idle: 2

  # ── JPA ───────────────────────────────────
  jpa:
    hibernate:
      ddl-auto: update        # dev: update / 주의: prod에서는 validate 또는 none
    show-sql: true
    properties:
      hibernate:
        format_sql: true
        dialect: org.hibernate.dialect.MySQLDialect

  # ── Redis ─────────────────────────────────
  data:
    redis:
      host: ${REDIS_HOST:localhost}
      port: ${REDIS_PORT:6379}
      password: ${REDIS_PASSWORD:}

  servlet:
    multipart:
      max-file-size: 20MB
      max-request-size: 25MB

  ai:
    anthropic:
      api-key: ${ANTHROPIC_API_KEY:}
      base-url: https://api.anthropic.com
      chat:
        model: claude-sonnet-4-6
        max-tokens: 16384

#  # ── Mail ──────────────────────────────────
#  mail:
#    host: ${MAIL_HOST:smtp.gmail.com}
#    port: ${MAIL_PORT:587}
#    username: ${MAIL_USERNAME:}
#    password: ${MAIL_PASSWORD:}
#    properties:
#      mail.smtp.auth: true
#      mail.smtp.starttls.enable: true

# ── JWT ───────────────────────────────────
jwt:
  secret: ${JWT_SECRET:dev-secret-key-please-change-in-production-at-least-32-characters-long}
  access-expiration: ${JWT_ACCESS_EXPIRATION:3600000}    # 1시간 (ms)
  refresh-expiration: ${JWT_REFRESH_EXPIRATION:604800000} # 7일 (ms)

# ── Cookie ────────────────────────────────
cookie:
  secure: false

# ── CORS ──────────────────────────────────
cors:
  allowed-origins: ${CORS_ALLOWED_ORIGINS:http://localhost:3000,http://localhost:5173}

