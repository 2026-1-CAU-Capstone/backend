# ── Logging ───────────────────────────────
logging:
  level:
    root: INFO
    org.hibernate.SQL: DEBUG
    org.hibernate.type.descriptor.sql: TRACE
    com.jazzify.backend.shared.omr.OmrClient: DEBUG          # OMR 요청/응답 헤더 · body 크기 로그
    com.jazzify.backend.shared.embedding.EmbeddingClient: DEBUG # 임베딩 요청/응답 로그

# ── Swagger / Springdoc ───────────────────
springdoc:
  api-docs:
    enabled: true
  swagger-ui:
    enabled: true
    tags-sorter: alpha
    operations-sorter: method

# ── OMR Server ────────────────────────────
omr:
  server-url: ${OMR_SERVER_URL:}
  # OMR 서버 요청 시 X-OMR-API-Key 헤더 값 (미설정 시 인증 생략)
  api-key: ${OMR_API_KEY:}
  # OMR 서버가 콜백 시 보내는 X-OMR-Callback-API-Key 검증용 (미설정 시 검증 생략)
  callback-api-key: ${OMR_CALLBACK_API_KEY:}
  # dev 환경: OMR 서버에 전달할 콜백 베이스 URL → /omr/dev/process 사용
  # 도메인별 콜백 경로(/v1/{solos|licks|chord-projects|sheet-projects}/omr/callback)는 OmrClient 가 자동 부착
  # (예: http://localhost:8080/api)
  # 미설정 시 /omr/prod/process 사용
  callback-url: ${OMR_CALLBACK_URL:}


# ── Embedding Server ──────────────────────
# OMR 서버와 동일한 호스트, 포트만 다름 (기본 8001)
# 컨테이너 내부 통신: http://jazzify-embedding-worker:8000
embedding:
  server-url: ${EMBEDDING_SERVER_URL:}  # 임베딩 서버 베이스 URL (예: http://127.0.0.1:8001)
  api-key: ${EMBEDDING_API_KEY:}        # 내부망 호출이면 비워도 됨


# ── RAG Server (PostgreSQL + pgvector) ─────────────
rag:
  enabled: true
  datasource:
    url: ${RAG_DB_URL:}
    username: ${RAG_DB_USERNAME:}
    password: ${RAG_DB_PASSWORD:}
    driver-class-name: org.postgresql.Driver
    maximum-pool-size: 4
  bootstrap:
    enabled: true
    create-schema: true
    data-root: ./data/explanation
  vector-store:
    schema-name: ${RAG_VECTOR_SCHEMA:public}
    table-name: ${RAG_VECTOR_TABLE:rag_chunk_store}
    initialize-schema: ${RAG_VECTOR_INITIALIZE_SCHEMA:false}
    schema-validation: ${RAG_VECTOR_SCHEMA_VALIDATION:false}
    dimensions: ${RAG_VECTOR_DIMENSIONS:768}
  retrieval:
    top-k: 5
    n-per-query: 3
    rrf-k: 60


