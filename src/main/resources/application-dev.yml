# ── Logging ───────────────────────────────
logging:
  level:
    root: INFO
    org.hibernate.SQL: DEBUG
    org.hibernate.type.descriptor.sql: TRACE
    com.jazzify.backend.shared.omr.OmrClient: DEBUG   # OMR 요청/응답 헤더 · body 크기 로그

# ── Swagger / Springdoc ───────────────────
springdoc:
  api-docs:
    enabled: true
  swagger-ui:
    enabled: true
    tags-sorter: alpha
    operations-sorter: method

# ── OMR Server ────────────────────────────
omr:
  server-url: ${OMR_SERVER_URL:}


# ── RAG Server (PostgreSQL + pgvector) ─────────────
rag:
  enabled: false
  datasource:
    url: ${RAG_DB_URL:}
    username: ${RAG_DB_USERNAME:}
    password: ${RAG_DB_PASSWORD:}
    driver-class-name: org.postgresql.Driver
    maximum-pool-size: 4
  bootstrap:
    enabled: false
    create-schema: false
    data-root: ./data/explanation
  embedding:
    server-url: ${RAG_EMBEDDING_SERVER_URL:} # 임베딩 전용 서버 주소
    endpoint: /api/v1/embeddings # TODO: 임베딩 서버에 실제 엔드포인트가 확정되면 교체
    api-key: ${RAG_EMBEDDING_API_KEY:} # 내부망 호출이면 비워도 됨
  retrieval:
    top-k: 5
    n-per-query: 3
    rrf-k: 60


