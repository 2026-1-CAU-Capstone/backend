# =============================================
# Test Profile - 테스트 환경 설정
# 실제 인프라 없이 인메모리로 동작
# =============================================

spring:
  profiles:
    active: test   # dev 프로파일 비활성화 → application-dev.yml 로드 안 함

  ai:
    anthropic:
      api-key: ""
      chat:
        options:
          model: claude-sonnet-4-6
          max-tokens: 16384

  # ── Database (H2 인메모리) ──────────────────────
  # MainDataSourceConfig 가 @Value("${spring.datasource.url}") 를 직접 읽으므로
  # 테스트에서도 명시적으로 H2 URL 을 지정해야 한다.
  datasource:
    url: jdbc:h2:mem:testdb;DB_CLOSE_DELAY=-1;DB_CLOSE_ON_EXIT=FALSE;MODE=MySQL
    username: sa
    password: ""
    driver-class-name: org.h2.Driver
    hikari:
      maximum-pool-size: 5
      minimum-idle: 1

  # ── JPA ───────────────────────────────────
  jpa:
    hibernate:
      ddl-auto: create-drop
    show-sql: false

  # ── Redis auto-config 제외 (MockBean으로 대체) ─
  autoconfigure:
    exclude:
      - org.springframework.boot.data.redis.autoconfigure.DataRedisAutoConfiguration
      - org.springframework.boot.data.redis.autoconfigure.DataRedisRepositoriesAutoConfiguration

# ── JWT ───────────────────────────────────
jwt:
  secret: test-secret-key-for-testing-purposes-must-be-at-least-32-characters-long
  access-expiration: 3600000
  refresh-expiration: 604800000

# ── Cookie ────────────────────────────────
cookie:
  secure: false

# ── CORS ──────────────────────────────────
cors:
  allowed-origins: http://localhost:3000


