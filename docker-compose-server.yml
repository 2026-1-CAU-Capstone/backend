services:
  backend:
    image: ${IMAGE_NAME}:latest
    container_name: backend
    env_file: .env
    environment:
      - SPRING_PROFILES_ACTIVE=prod
      - JAVA_OPTS=${JAVA_OPTS}
      # EMBEDDING_SERVER_URL 은 외부 서버(.env)에서 주입 — OMR 서버와 동일 호스트, 포트만 다름
      # 예) EMBEDDING_SERVER_URL=http://<omr-server-host>:8001
    ports:
      - "8080:8080"
    volumes:
      - ./logs:/var/log/backend
    networks:
      - app-network
    restart: unless-stopped
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy
      pgvector:
        condition: service_healthy

  db:
    image: mysql:8.0
    container_name: db
    restart: unless-stopped
    environment:
      MYSQL_DATABASE: ${DB_NAME}
      MYSQL_USER: ${DB_USERNAME}
      MYSQL_PASSWORD: ${DB_PASSWORD}
      MYSQL_ROOT_PASSWORD: ${DB_ROOT}
    volumes:
      - db-data:/var/lib/mysql
    ports:
      - "3306:3306"
    networks:
      - app-network
    healthcheck:
      test: [ "CMD", "mysqladmin", "ping", "-h", "localhost", "-u", "root", "-p${DB_ROOT}" ]
      interval: 10s
      timeout: 5s
      retries: 10

  redis:
    image: redis:7-alpine
    container_name: redis
    command: redis-server --requirepass ${REDIS_PASSWORD}
    volumes:
      - redis-data:/data
    networks:
      - app-network
    restart: unless-stopped
    healthcheck:
      test: [ "CMD", "redis-cli", "-a", "${REDIS_PASSWORD}", "ping" ]
      interval: 10s
      timeout: 5s
      retries: 10

  pgvector:
    image: pgvector/pgvector:pg16
    container_name: pgvector
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${RAG_DB_NAME}
      POSTGRES_USER: ${RAG_DB_USERNAME}
      POSTGRES_PASSWORD: ${RAG_DB_PASSWORD}
    volumes:
      - pgvector-data:/var/lib/postgresql/data
    networks:
      - app-network
    ports:
      - "5432:5432"
    healthcheck:
      test: [ "CMD-SHELL", "pg_isready -U ${RAG_DB_USERNAME} -d ${RAG_DB_NAME}" ]
      interval: 10s
      timeout: 5s
      retries: 10

volumes:
  db-data:
  redis-data:
  pgvector-data:

networks:
  app-network:
    driver: bridge